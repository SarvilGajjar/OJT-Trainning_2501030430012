<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Furniture</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <!-- Navbar -->
    <div class="container">
        <nav class="navbar">
            <h1><a href="index.html" style="text-decoration:none; color:inherit;">Furniture</a></h1>
            <div class="nav-links">
                <ul>
                    <li><a href="index.html"><i class="bi bi-house-door-fill"></i> Home</a></li>
                    <li><a href="index.html#services"><i class="bi bi-stars"></i> Services</a></li>
                    <li><a href="index.html#products"><i class="bi bi-grid-3x3-gap-fill"></i> Product</a></li>
                    <li><a href="index.html#gallery"><i class="bi bi-images"></i> Gallery</a></li>
                    <li><a href="index.html#contact"><i class="bi bi-envelope-fill"></i> Contact Us</a></li>
                    <li><a href="login.html"><button class="active"><i class="bi bi-person-circle"></i> Login</button></a></li>
                </ul>
            </div>
        </nav>
    </div>

    <!-- Login Form -->
    <div class="auth-body">
        <div class="auth-card">
            <div class="auth-card-header">
                <h2>Welcome Back</h2>
                <p>Sign in to your Furniture account</p>
            </div>
            <div class="auth-card-body">
                <form action="#" method="post">

                    <div class="form-group">
                        <label for="email"><i class="bi bi-envelope-fill"></i> Email Address</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password"><i class="bi bi-lock-fill"></i> Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>

                    <div class="form-row">
                        <label class="remember-label">
                            <input type="checkbox" name="remember"> Remember me
                        </label>
                        <a href="#" class="forgot-link"><i class="bi bi-question-circle"></i> Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-auth"><i class="bi bi-box-arrow-in-right"></i> Login</button>
                </form>

                <div class="divider"><span>or</span></div>

                <div class="auth-footer">
                    Don't have an account? <a href="Register.html"><i class="bi bi-person-plus-fill"></i> Register here</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
